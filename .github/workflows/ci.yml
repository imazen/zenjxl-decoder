name: CI

on:
  push:
    branches: [main]
  pull_request:
    types: [opened, reopened, synchronize]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  format:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-11-arm, macos-26-intel]
        features: [all, none]
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ matrix.os }}-clippy-${{ matrix.features }}

      - name: Clippy (all features)
        if: matrix.features == 'all'
        run: cargo clippy --release --all-targets --all-features --tests --all -- -D warnings

      - name: Clippy (no features)
        if: matrix.features == 'none'
        run: cargo clippy --release --all-targets --no-default-features --tests --all -- -D warnings

  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, ubuntu-24.04-arm, windows-11-arm, macos-26-intel]
        features: [all, none]
        include:
          # SIMD-specific test runs on matching platforms
          - os: ubuntu-latest
            features: sse42
          - os: ubuntu-latest
            features: avx
          - os: ubuntu-latest
            features: avx512
          - os: ubuntu-24.04-arm
            features: neon
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: ${{ matrix.os }}-test-${{ matrix.features }}

      - name: Test (all features)
        if: matrix.features == 'all'
        run: cargo test --release --all --no-fail-fast --all-features

      - name: Test (no features)
        if: matrix.features == 'none'
        run: cargo test --release --all --no-fail-fast --no-default-features

      - name: Test (SIMD ${{ matrix.features }})
        if: matrix.features != 'all' && matrix.features != 'none'
        run: cargo test --release --all --no-fail-fast --no-default-features --features ${{ matrix.features }}

  test-i686:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: i686-unknown-linux-gnu

      - name: Install cross
        run: cargo install cross --locked

      - uses: Swatinem/rust-cache@v2
        with:
          prefix-key: i686

      - name: Test (i686, no features)
        run: cross test --release --all --no-fail-fast --no-default-features --target i686-unknown-linux-gnu

      - name: Test (i686, all features)
        # compare_pipelines and compare_incremental decode the image twice,
        # doubling memory usage. For large images (portrait_4k, tirr_photo,
        # progressive_5) this exceeds 32-bit address space. Single decodes
        # pass fine. The double-decode variants are covered by 64-bit runs.
        run: cross test --release --all --no-fail-fast --all-features --target i686-unknown-linux-gnu -- --skip compare_pipelines_portrait_4k --skip compare_pipelines_tirr_photo --skip compare_pipelines_progressive_5 --skip compare_incremental_tirr_photo
