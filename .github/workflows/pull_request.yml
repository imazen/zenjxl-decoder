# PR-specific checks (source validation, conformance, benchmarks).
# Core CI (format, clippy, test, i686) is in ci.yml.

name: PR

on:
  pull_request:
    types: [opened, reopened, synchronize]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  source_checks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - run: ./ci/pull_request_checks.sh

  authors:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
    - uses: actions/checkout@v4
    - run: ./ci/author_check.sh

  coverage:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - uses: dtolnay/rust-toolchain@stable

    - uses: Swatinem/rust-cache@v2

    - name: Install llvm-cov
      run: cargo +stable install cargo-llvm-cov --locked

    - name: Build and gather coverage
      run: cargo llvm-cov --no-report --release

    - name: Generate JSON report
      run: cargo llvm-cov report --json --release --output-path=coverage.json

    - name: Distill summary
      run: ./ci/coverage_summary.py >> $GITHUB_STEP_SUMMARY

    - name: Generate HTML report
      run: cargo llvm-cov report --html --release --output-dir=coverage_html

    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      with:
        name: coverage_report
        path: ./coverage_html/html

  conformance:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Checkout bench
      uses: actions/checkout@master
      with:
        repository: libjxl/bench
        path: bench
        fetch-depth: 1

    - name: Fix bench dependencies
      run: |
        ( cd bench && git submodule update --recursive --init --depth 1 --recommend-shallow third_party/conformance )
        ( cd bench/third_party && rm -rf jxl-rs && ln -s "${GITHUB_WORKSPACE}" jxl-rs )

    - name: Cache conformance objects
      uses: actions/cache@v4
      with:
        path: bench/third_party/conformance/.objects
        key: conformance-objects

    - name: Update conformance objects
      run: bash bench/third_party/conformance/scripts/download_and_symlink_using_curl.sh

    - uses: dtolnay/rust-toolchain@stable

    - uses: Swatinem/rust-cache@v2

    - name: Build CLI
      run: cargo build --release --bin zenjxl-decoder-cli

    - uses: actions/setup-python@v5
      with:
        python-version: '3.x'

    - name: Install Python dependencies
      run: pip install numpy apng pypng

    - name: Install binary dependencies
      run: sudo apt update && sudo apt install imagemagick

    - name: Run conformance tests with ICC
      run: python3 ./bench/third_party/conformance/scripts/conformance.py --decoder "python3 ${GITHUB_WORKSPACE}/bench/scripts/wrap_jxl-rs.py --decoder ' ${GITHUB_WORKSPACE}/bench/third_party/jxl-rs/target/release/zenjxl-decoder-cli %s %s --icc-out %s'" --corpus ${GITHUB_WORKSPACE}/bench/third_party/conformance/testcases/main_level5.txt --results=${GITHUB_WORKSPACE}/bench/docs/dumps/dump_jxl-rs.json --lax

    - name: Run conformance tests via PNG
      continue-on-error: true
      run: python3 ./bench/third_party/conformance/scripts/conformance.py --decoder "python3 ${GITHUB_WORKSPACE}/bench/scripts/wrap_png.py --decoder ' ${GITHUB_WORKSPACE}/bench/third_party/jxl-rs/target/release/zenjxl-decoder-cli --override-bitdepth=16 %s %s '" --corpus ${GITHUB_WORKSPACE}/bench/third_party/conformance/testcases/main_level5.txt --results=${GITHUB_WORKSPACE}/bench/docs/dumps/dump_jxl-rs_via_png.json --lax

    - name: Export step summary
      run: ./ci/conformance_summary.py "${GITHUB_WORKSPACE}/bench/docs/dumps/dump_jxl-rs.json" "${GITHUB_WORKSPACE}/bench/docs/dumps/dump_jxl-rs_via_png.json" >> $GITHUB_STEP_SUMMARY

    - name: Merge conformance report HTML
      run: ./ci/merge_conformance_report.py "${GITHUB_WORKSPACE}/bench/docs" >> conformance_report.html

    - name: Upload HTML report
      uses: actions/upload-artifact@v4
      with:
        name: conformance_report
        path: conformance_report.html

  benchmark:
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      pull-requests: write
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Fetch base branch
      run: git fetch origin ${{ github.base_ref }}

    - uses: dtolnay/rust-toolchain@stable

    - uses: Swatinem/rust-cache@v2
      with:
        prefix-key: benchmark

    - name: Install jxl-perfhistory
      run: cargo install --git https://github.com/zond/jxl-perfhistory

    - name: Select test images
      run: |
        mkdir testimages
        cp zenjxl-decoder/resources/test/conformance_test_images/sunset_logo.jxl testimages
        cp zenjxl-decoder/resources/test/conformance_test_images/bike.jxl testimages
        cp zenjxl-decoder/resources/test/green_queen_modular_e3.jxl testimages
        cp zenjxl-decoder/resources/test/green_queen_vardct_e3.jxl testimages

    - uses: actions/cache@v4
      with:
        path: benchmark-binaries
        key: ${{ runner.os }}-${{ runner.arch }}-benchmark-binaries

    - name: Run benchmark
      continue-on-error: true
      run: |
        mkdir -p benchmark-binaries
        (jxl-perfhistory -b benchmark-binaries -g "testimages/*.jxl" -c 0.99 -e 0.03 --ignore-noisy-system --pr-comment || echo "Benchmark failed") > benchmark.txt

    - name: Save PR context
      run: |
        echo "${{ github.event.number }}" > pr_number.txt
        echo "${{ github.event.pull_request.head.sha }}" > head_sha.txt

    - name: Step summary
      if: always()
      run: |
        echo "## Performance Benchmark" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        if [ -f benchmark.txt ]; then
          cat benchmark.txt >> $GITHUB_STEP_SUMMARY
        else
          echo "Benchmark was not run." >> $GITHUB_STEP_SUMMARY
        fi

    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: benchmark-results
        path: |
          benchmark.txt
          pr_number.txt
          head_sha.txt
        if-no-files-found: ignore
